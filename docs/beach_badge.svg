<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 200" font-family="'Segoe UI', system-ui, -apple-system, sans-serif">
  <defs>
    <linearGradient id="bgG" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#161b22"/>
    </linearGradient>
    <linearGradient id="sunset" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ff9a44"/>
      <stop offset="50%" stop-color="#ff4757"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <filter id="gl">
      <feGaussianBlur stdDeviation="2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="sh">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.5"/>
    </filter>
  </defs>

  <rect width="900" height="200" rx="16" fill="url(#bgG)"/>
  <rect x="1" y="1" width="898" height="198" rx="15" fill="none" stroke="#ff975522" stroke-width="1"/>

  <!-- Title row -->
  <g transform="translate(30, 24)">
    <rect x="0" y="0" width="50" height="50" rx="10" fill="#ff975518" stroke="#ff975544" stroke-width="1"/>
    <text x="25" y="33" text-anchor="middle" fill="#ff9755" font-size="18" font-weight="800" filter="url(#gl)">60s</text>
    <text x="64" y="20" fill="#f0f6fc" font-size="18" font-weight="700">Beach Sunset Demo</text>
    <text x="64" y="40" fill="#8b949e" font-size="12">Golden hour to night — 1440 frames generated from a single LLM prompt</text>
  </g>

  <!-- Stat cards -->
  <g transform="translate(30, 92)">
    <rect x="0" y="0" width="130" height="56" rx="8" fill="#1c1f26" stroke="#30363d" stroke-width="1" filter="url(#sh)"/>
    <text x="16" y="24" fill="#ff9755" font-size="20" font-weight="700" filter="url(#gl)">1440</text>
    <text x="16" y="42" fill="#8b949e" font-size="11">frames @ 24fps</text>

    <rect x="146" y="0" width="130" height="56" rx="8" fill="#1c1f26" stroke="#30363d" stroke-width="1" filter="url(#sh)"/>
    <text x="162" y="24" fill="#ff9755" font-size="20" font-weight="700" filter="url(#gl)">60s</text>
    <text x="162" y="42" fill="#8b949e" font-size="11">duration</text>

    <rect x="292" y="0" width="130" height="56" rx="8" fill="#1c1f26" stroke="#30363d" stroke-width="1" filter="url(#sh)"/>
    <text x="308" y="24" fill="#ff9755" font-size="20" font-weight="700" filter="url(#gl)">80 MB</text>
    <text x="308" y="42" fill="#8b949e" font-size="11">.vh file size</text>

    <rect x="438" y="0" width="130" height="56" rx="8" fill="#1c1f26" stroke="#30363d" stroke-width="1" filter="url(#sh)"/>
    <text x="454" y="24" fill="#ff9755" font-size="20" font-weight="700" filter="url(#gl)">6</text>
    <text x="454" y="42" fill="#8b949e" font-size="11">annotated phases</text>

    <rect x="584" y="0" width="130" height="56" rx="8" fill="#1c1f26" stroke="#30363d" stroke-width="1" filter="url(#sh)"/>
    <text x="600" y="24" fill="#ff9755" font-size="20" font-weight="700" filter="url(#gl)">6</text>
    <text x="600" y="42" fill="#8b949e" font-size="11">palm trees</text>

    <rect x="730" y="0" width="130" height="56" rx="8" fill="#1c1f26" stroke="#30363d" stroke-width="1" filter="url(#sh)"/>
    <text x="746" y="24" fill="#ff9755" font-size="20" font-weight="700" filter="url(#gl)">150</text>
    <text x="746" y="42" fill="#8b949e" font-size="11">stars + moon</text>
  </g>

  <!-- Sunset gradient bar -->
  <rect x="30" y="164" width="840" height="6" rx="3" fill="url(#sunset)" opacity="0.5"/>

  <!-- Phase labels on the bar -->
  <text x="30" y="184" fill="#ff975588" font-size="9" font-weight="600">GOLDEN HOUR</text>
  <text x="220" y="184" fill="#ff475788" font-size="9" font-weight="600">SUNSET</text>
  <text x="420" y="184" fill="#7c3aed88" font-size="9" font-weight="600">DEEP SUNSET</text>
  <text x="600" y="184" fill="#4a3a8088" font-size="9" font-weight="600">TWILIGHT</text>
  <text x="780" y="184" fill="#1a1a4088" font-size="9" font-weight="600">NIGHT</text>
</svg>
